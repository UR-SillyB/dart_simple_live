name: app-build-action-dev

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - dev_synced
  push:
    tags:
      - "dev_v*"

jobs:
  # ж‰“еЊ…AndroidгЂЃiOSгЂЃMac
  build-mac-ios-android:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      # з­ѕе‡єд»Јз Ѓ
      - uses: actions/checkout@v4
        with:
          ref: dev

      # и®ѕзЅ®JAVAзЋЇеўѓ
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # APKз­ѕеђЌи®ѕзЅ®пј€ж—  secrets ж—¶и‡ЄеЉЁе›ћйЂЂ debug keystoreпј‰
      - name: Prepare Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_BASE64}" ] && [ -n "${STORE_PASSWORD}" ] && [ -n "${KEY_PASSWORD}" ] && [ -n "${KEY_ALIAS}" ]; then
            mkdir -p simple_live_app/android
            if base64 --help 2>/dev/null | grep -q -- "--decode"; then
              echo "${KEYSTORE_BASE64}" | base64 --decode > simple_live_app/android/keystore.jks
            else
              echo "${KEYSTORE_BASE64}" | base64 -D > simple_live_app/android/keystore.jks
            fi
            {
              echo "storeFile=$(pwd)/simple_live_app/android/keystore.jks"
              echo "storePassword=${STORE_PASSWORD}"
              echo "keyPassword=${KEY_PASSWORD}"
              echo "keyAlias=${KEY_ALIAS}"
            } > simple_live_app/android/key.properties
          else
            mkdir -p "${HOME}/.android"
            if [ ! -f "${HOME}/.android/debug.keystore" ]; then
              keytool -genkeypair \
                -v \
                -storetype PKCS12 \
                -keystore "${HOME}/.android/debug.keystore" \
                -alias androiddebugkey \
                -storepass android \
                -keypass android \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
            fi
            {
              echo "storeFile=${HOME}/.android/debug.keystore"
              echo "storePassword=android"
              echo "keyPassword=android"
              echo "keyAlias=androiddebugkey"
            } > simple_live_app/android/key.properties
          fi

      # и®ѕзЅ®Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # ж‰“ејЂMAC Desktopж”ЇжЊЃ
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # ж›ґж–°Flutterзљ„packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # е®‰иЈ…appdmg npm install -g appdmg
      - name: Install appdmg
        run: npm install -g appdmg

      # и®ѕзЅ®flutter_distributorзЋЇеўѓ
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      # ж‰“еЊ…APK
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      #дёЉдј Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      #ж‰“еЊ…iOS
      - name: Build IPA
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      #е€›е»єжњЄз­ѕеђЌipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      # дёЉдј IPAи‡іArtifacts
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # ж‰“еЊ…MAC
      - name: Build MacOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # дёЉдј MACи‡іArtifacts
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
      #е®Њж€ђ
      - run: echo "рџЌЏ This job's status is ${{ job.status }}."

  # ж‰“еЊ…Linux
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # з­ѕе‡єд»Јз Ѓ
      - uses: actions/checkout@v4
        with:
          ref: dev
      # и®ѕзЅ®FlutterзЋЇеўѓ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      # е®‰иЈ…дѕќиµ–
      - name: Update apt-get
        run: sudo apt-get update
      - name: Install Dependencies
        run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv
      # ж‰“ејЂLinux Desktopж”ЇжЊЃ
      - name: Enable Flutter Desktop
        run: flutter config --enable-linux-desktop
      # ж›ґж–°Flutterзљ„packages
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # и®ѕзЅ®flutter_distributorзЋЇеўѓ
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Linux ZIP\DMG
      - name: Build Linux
        run: |
          cd simple_live_app
          flutter_distributor package --platform linux --targets deb,zip --skip-clean
      # дёЉдј LinuxеЊ…и‡іArtifacts
      - name: Upload Linux APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip

        #е®Њж€ђ
      - run: echo "рџЌЏ Linux job's status is ${{ job.status }}."

  # ж‰“еЊ…Windows
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # з­ѕе‡єд»Јз Ѓ
      - uses: actions/checkout@v4
        with:
          ref: dev
      # и®ѕзЅ®FlutterзЋЇеўѓ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # и®ѕзЅ®flutter_distributorзЋЇеўѓ
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Windows ZIP\MSIX
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets zip --skip-clean
      # дёЉдј Windowsи‡іArtifacts
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.zip
        #е®Њж€ђ
      - run: echo "рџЌЏ Windows job's status is ${{ job.status }}."
